version: '3.8'

services:
  # -----------------------------------------------------------------------
  # FastAPI ML Bridge — API Gateway
  # -----------------------------------------------------------------------
  fastapi-ml-bridge:
    build:
      context: ./fastapi
      dockerfile: Dockerfile
    container_name: fastapi-ml-bridge
    ports:
      - "8000:8000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL:https://mawewomqcdnsqnxmkjlq.supabase.co}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1hd2V3b21xY2Ruc3FueG1ramxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NjE3NDYsImV4cCI6MjA5NTUzNzc0Nn0.C8-XJL8B6_EyBTKo7UEL9Rmz5-BMvB1Y3GG8RnkND24}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1hd2V3b21xY2Ruc3FueG1ramxxIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3OTk2MTc0NiwImV4cCI6MjA5NTUzNzc0Nn0.r5G_Yk-dY1R7gYlX8i_Xb2lK7M2HhWkHqY-q_4Y1D7M}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET:super-secret-jwt-token}
      - ML_SERVICE_URL=${ML_SERVICE_URL:http://ml-service.railway.internal:8080}
      - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI:sqlite:///mlruns.db}
      - DEBUG=${DEBUG:false}
    volumes:
      # Memusatkan tracking MLflow di ml-service
      - ./mlruns:/app/mlruns
      - ./mlruns.db:/app/mlruns.db
    restart: unless-stopped
    depends_on:
      - ml-service
    networks:
      - agrolytics-net

  # -----------------------------------------------------------------------
  # ML Service — Paddy Disease Detection (Soft Voting Ensemble)
  # -----------------------------------------------------------------------
  ml-service:
    # Menggunakan image dari Docker Hub (Setup default)
    # Jika Anda ingin build ulang secara lokal, docker-compose akan menggunakan `build` context di bawah
    image: agrolytics/agrolytics_paddy_softvoting_ensemble:v1
    build:
      context: ../paddy_detection/Paddy_SoftVoting_Ensemble
      dockerfile: Dockerfile
    container_name: ml-service
    ports:
      - "5000:8000"
    environment:
      - TF_ENABLE_ONEDNN_OPTS=0
    volumes:
      # Sinkronisasi folder tracking MLflow
      - ./mlruns:/opt/mlflow/mlruns
      - ./mlruns.db:/opt/mlflow/mlruns.db
    restart: unless-stopped
    networks:
      - agrolytics-net

  # -----------------------------------------------------------------------
  # Prometheus — Metrics Collection
  # -----------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped
    depends_on:
      - fastapi-ml-bridge
    networks:
      - agrolytics-net

  # -----------------------------------------------------------------------
  # Grafana — Dashboards & Visualization
  # -----------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-storage:/var/lib/grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    networks:
      - agrolytics-net

volumes:
  grafana-storage:

networks:
  agrolytics-net:
    driver: bridge
