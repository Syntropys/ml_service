version: '3.8'

services:
  # -----------------------------------------------------------------------
  # FastAPI ML Bridge — API Gateway
  # -----------------------------------------------------------------------
  fastapi-ml-bridge:
    build:
      context: ./fastapi
      dockerfile: Dockerfile
    container_name: fastapi-ml-bridge
    ports:
      - "8000:8000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL:-https://mawewomqcdnsqnxmkjlq.supabase.co}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET:-super-secret-jwt-token}
      - ML_SERVICE_URL=${ML_SERVICE_URL:-http://ml-service:8000}
      - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI:-sqlite:///mlruns.db}
      - DEBUG=${DEBUG:-false}
    restart: unless-stopped
    depends_on:
      - ml-service
    networks:
      - agrolytics-net

  # -----------------------------------------------------------------------
  # ML Service — Paddy Disease Detection (Soft Voting Ensemble)
  # -----------------------------------------------------------------------
  ml-service:
    image: agrolytics/paddy_softvoting_ensemble@sha256:144a2398309cb5d4d2aeaac146da9a7cbef77a6321e78e84b6b3f7c050d49da0
    container_name: ml-service
    ports:
      - "5000:8000"
    restart: unless-stopped
    networks:
      - agrolytics-net

  # -----------------------------------------------------------------------
  # Prometheus — Metrics Collection
  # -----------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped
    depends_on:
      - fastapi-ml-bridge
    networks:
      - agrolytics-net

  # -----------------------------------------------------------------------
  # Grafana — Dashboards & Visualization
  # -----------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-storage:/var/lib/grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    networks:
      - agrolytics-net

volumes:
  grafana-storage:

networks:
  agrolytics-net:
    driver: bridge
