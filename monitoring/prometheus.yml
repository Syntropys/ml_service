# Prometheus Configuration for Paddy ML Bridge API
# Scrapes the FastAPI /metrics endpoint exposed by prometheus-fastapi-instrumentator

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/alert_rules.yml"

scrape_configs:
  - job_name: "fastapi-ml-bridge"
    metrics_path: /metrics
    static_configs:
      - targets: ["mlservice-production-4577.up.railway.app"]
        labels:
          service: "paddy-ml-bridge"
          environment: "development"
